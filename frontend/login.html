<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CloudRain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { padding-top: 0; }
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-box {
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .brand {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
            margin-bottom: 0.4rem;
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0;
        }
        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-lg);
        }
        .form-group { margin-bottom: 1rem; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }
        .login-footer a {
            color: var(--accent);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-header">
            <span class="brand">☁️ CloudRain</span>
            <p>Entre na sua conta para continuar</p>
        </div>
        <div class="login-card">
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email"
                           required autocomplete="email" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha"
                           required autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-cloud btn-submit">Entrar</button>
            </form>
            <div id="alertaErro" class="alert-erro"></div>
        </div>
        <p class="login-footer">
            Não tem conta? <a href="register.html">Cadastre-se gratuitamente</a>
        </p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/login.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
