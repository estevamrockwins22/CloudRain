<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — CloudRain</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { padding-top: 0; }
        .register-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .register-box {
            width: 100%;
            max-width: 440px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .register-header .brand {
            font-family: var(--font-display);
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent);
            display: block;
            margin-bottom: 0.4rem;
        }
        .register-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0;
        }
        .register-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-xl);
            padding: 32px;
            box-shadow: var(--shadow-lg);
        }
        .form-group { margin-bottom: 1rem; }
        .btn-submit {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .register-footer {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.88rem;
            color: var(--text-secondary);
        }
        .register-footer a {
            color: var(--accent);
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="register-wrapper">
    <div class="register-box">
        <div class="register-header">
            <span class="brand">☁️ CloudRain</span>
            <p>Crie sua conta e comece a compartilhar</p>
        </div>
        <div class="register-card">
            <form id="registerForm" novalidate>
                <div class="form-group">
                    <label for="nome" class="form-label">Nome artístico</label>
                    <input type="text" class="form-control" id="nome"
                           required autocomplete="name" placeholder="Como quer ser chamado">
                </div>
                <div class="form-group">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email"
                           required autocomplete="email" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha"
                           required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="confirmarSenha" class="form-label">Confirmar senha</label>
                    <input type="password" class="form-control" id="confirmarSenha"
                           required autocomplete="new-password" placeholder="Repita a senha">
                </div>
                <button type="submit" class="btn-cloud btn-submit">Criar conta</button>
            </form>
            <div id="alertaMsg"></div>
        </div>
        <p class="register-footer">
            Já tem conta? <a href="login.html">Fazer login</a>
        </p>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/register.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
